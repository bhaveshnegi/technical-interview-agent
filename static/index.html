<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agent - AI Interviewer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #000000;
            --surface: #111111;
            --border: #222222;
            --text-main: #ffffff;
            --text-dim: #888888;
            --accent: #ffffff;
            --user-bubble: #ffffff;
            --user-text: #000000;
            --agent-bubble: #111111;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }

        header {
            padding: 3rem 2rem 1.5rem 2rem;
            text-align: center;
            width: 100%;
        }

        h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 2.2rem;
            font-weight: 600;
            letter-spacing: -0.02em;
            margin-bottom: 0.2rem;
            color: var(--text-main);
        }

        .container {
            width: 95%;
            max-width: 750px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            padding: 0 0 3rem 0;
            height: calc(100vh - 180px);
        }

        .chat-card {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            height: 100%;
            overflow: hidden;
        }

        /* Unified Chat Area */
        .chat-messages {
            flex-grow: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            padding: 2rem;
            scrollbar-width: none;
        }

        .chat-messages::-webkit-scrollbar {
            display: none;
        }

        .message {
            max-width: 85%;
            padding: 0.8rem 1.1rem;
            border-radius: 14px;
            line-height: 1.6;
            font-size: 0.92rem;
            animation: fadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .agent-msg {
            align-self: flex-start;
            background: var(--agent-bubble);
            color: #eeeeee;
            border: 1px solid var(--border);
            border-bottom-left-radius: 2px;
        }

        .user-msg {
            align-self: flex-end;
            background: var(--user-bubble);
            color: var(--user-text);
            font-weight: 500;
            border-bottom-right-radius: 2px;
        }

        /* Chat Input Wrapper */
        .chat-input-wrapper {
            padding: 1.5rem 2rem 2rem 2rem;
            background: var(--bg);
        }

        .chat-input-container {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 0.6rem 0.8rem;
            transition: all 0.2s ease;
        }

        .chat-input-container:focus-within {
            border-color: #444;
        }

        .attach-btn {
            background: none;
            border: none;
            color: var(--text-dim);
            cursor: pointer;
            padding: 0.4rem;
            border-radius: 8px;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .attach-btn:hover {
            color: var(--text-main);
            background: #222;
        }

        input[type="text"] {
            flex-grow: 1;
            background: none;
            border: none;
            padding: 0.5rem 0.2rem;
            color: white;
            outline: none;
            font-size: 0.92rem;
            font-family: inherit;
        }

        input[type="text"]::placeholder {
            color: #555;
        }

        .send-btn {
            background: none;
            color: var(--text-dim);
            border: none;
            width: 36px;
            height: 36px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .send-btn:hover {
            color: var(--text-main);
            transform: translateX(2px);
        }

        .send-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        /* Report Styles */
        .report-card {
            margin-top: 1rem;
            background: var(--surface);
            border-radius: 14px;
            padding: 2rem;
            border: 1px solid var(--border);
        }

        .report-text {
            white-space: pre-wrap;
            font-size: 0.88rem;
            line-height: 1.7;
            color: #cccccc;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .typing-indicator {
            display: flex;
            gap: 5px;
            padding: 5px 2px;
        }

        .dot {
            width: 5px;
            height: 5px;
            background: #444;
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out both;
        }

        .dot:nth-child(1) { animation-delay: -0.32s; }
        .dot:nth-child(2) { animation-delay: -0.16s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }
    </style>
</head>
<body>
    <header>
        <h1>Agent</h1>
        <p style="color: var(--text-dim); font-size: 0.9rem; letter-spacing: 0.05em; text-transform: uppercase;">AI Screening</p>
    </header>

    <div class="container">
        <div class="chat-card">
            <div class="chat-messages" id="chat-messages"></div>
            
            <div class="chat-input-wrapper">
                <div class="chat-input-container">
                    <button class="attach-btn" id="attach-btn" title="Upload Resume">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"></path>
                        </svg>
                    </button>
                    <input type="file" id="file-input" hidden accept=".pdf,.txt">
                    <input type="text" id="user-input" placeholder="Attach resume to start...">
                    <button class="send-btn" id="send-btn">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="22" y1="2" x2="11" y2="13"></line>
                            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                        </svg>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = ''; 
        let sessionId = null;
        let isUploading = false;

        const chatMessages = document.getElementById('chat-messages');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const fileInput = document.getElementById('file-input');
        const attachBtn = document.getElementById('attach-btn');

        window.onload = () => {
            addMessage("Welcome. Tap the paperclip to upload your resume and begin the screening.", 'agent');
        };

        attachBtn.onclick = () => fileInput.click();

        fileInput.onchange = async (e) => {
            if (e.target.files.length === 0) return;
            const file = e.target.files[0];
            
            addMessage(`Attached: ${file.name}`, 'user');
            
            isUploading = true;
            attachBtn.disabled = true;
            userInput.disabled = true;
            sendBtn.disabled = true;

            const typingMsg = showTypingIndicator();
            const formData = new FormData();
            formData.append('file', file);

            try {
                const response = await fetch(`${API_URL}/upload`, {
                    method: 'POST',
                    body: formData
                });
                const data = await response.json();
                typingMsg.remove();

                if (response.ok) {
                    sessionId = data.session_id;
                    addMessage(data.message, 'agent');
                    userInput.placeholder = "Type your response...";
                    userInput.disabled = false;
                    sendBtn.disabled = false;
                } else {
                    addMessage("Upload failed. Try again.", 'agent');
                }
            } catch (err) {
                typingMsg.remove();
                addMessage("Connection error.", 'agent');
            } finally {
                isUploading = false;
                attachBtn.disabled = false;
                fileInput.value = '';
            }
        };

        async function sendMessage() {
            const text = userInput.value.trim();
            if (!text || !sessionId || isUploading) return;

            userInput.value = '';
            addMessage(text, 'user');
            const typingMsg = showTypingIndicator();
            
            try {
                const response = await fetch(`${API_URL}/chat`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ session_id: sessionId, message: text })
                });
                const data = await response.json();
                typingMsg.remove();

                if (response.ok) {
                    if (data.type === 'report') {
                        addMessage("Screening complete. Summary generated below.", 'agent');
                        showReport(data.message);
                        userInput.disabled = true;
                        sendBtn.disabled = true;
                    } else {
                        addMessage(data.message, 'agent');
                    }
                } else {
                    addMessage("Error processing response.", 'agent');
                }
            } catch (err) {
                typingMsg.remove();
                addMessage("Connection lost.", 'agent');
            }
        }

        sendBtn.onclick = sendMessage;
        userInput.onkeypress = (e) => { if (e.key === 'Enter') sendMessage(); };

        function addMessage(text, side) {
            const div = document.createElement('div');
            div.className = `message ${side}-msg`;
            div.innerText = text;
            chatMessages.appendChild(div);
            chatMessages.scrollTop = chatMessages.scrollHeight;
            return div;
        }

        function showTypingIndicator() {
            const div = document.createElement('div');
            div.className = 'message agent-msg';
            div.innerHTML = '<div class="typing-indicator"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>';
            chatMessages.appendChild(div);
            chatMessages.scrollTop = chatMessages.scrollHeight;
            return div;
        }

        function showReport(reportText) {
            const div = document.createElement('div');
            div.className = 'report-card';
            div.innerHTML = '<h3 style="margin-bottom: 1.5rem; font-family: Outfit; font-size: 1.2rem;">Screening Summary</h3><div class="report-text">' + reportText + '</div>';
            chatMessages.appendChild(div);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }
    </script>
</body>
</html>
